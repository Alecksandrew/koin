name: CI Pipeline

on:
  pull_request:
    branches: ["main", "develop"]

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Npm commands
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build-storybook
          npm run build

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
